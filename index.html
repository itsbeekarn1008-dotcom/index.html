<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AIFX AR Demo</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    #startBtn {
      margin-top: 20px;
      padding: 14px 26px;
      border: none;
      border-radius: 999px;
      background: #fff;
      color: #000;
      font-size: 16px;
      cursor: pointer;
    }
  </style>

  <script>
    AFRAME.registerComponent("play-video-on-marker", {
      init: function () {
        const marker = this.el;
        const video = document.querySelector("#aifxVideo");

        marker.addEventListener("markerFound", function () {
          video.play();
        });

        marker.addEventListener("markerLost", function () {
          video.pause();
          video.currentTime = 0;
        });
      }
    });

    document.addEventListener("DOMContentLoaded", function () {
      const startBtn = document.querySelector("#startBtn");
      const startScreen = document.querySelector("#startScreen");

      startBtn.addEventListener("click", async function () {
        const video = document.querySelector("#aifxVideo");

        try {
          await video.play();
          video.pause();
          video.currentTime = 0;
        } catch (e) {
          console.log(e);
        }

        startScreen.style.display = "none";
      });
    });
  </script>
</head>

<body>
  <div id="startScreen">
    <h1>AIFX AR Demo</h1>
    <p>กด Start AR แล้วอนุญาตให้ใช้กล้อง จากนั้นจ่อไปที่ Hiro Marker</p>
    <button id="startBtn">Start AR</button>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true"
    arjs="sourceType: webcam; debugUIEnabled: false;"
  >
    <a-assets>
      <video
        id="aifxVideo"
        src="./assets/video/aifx-motion.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
      ></video>
    </a-assets>

    <a-marker preset="hiro" play-video-on-marker>
      <a-video
        src="#aifxVideo"
        position="0 0 0"
        rotation="-90 0 0"
        width="2.2"
        height="1.25"
      ></a-video>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
