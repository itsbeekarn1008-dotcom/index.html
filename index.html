```html
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AIFX AR Custom Markers</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- AR.js Marker Based -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.94);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    #startScreen h1 {
      font-size: 28px;
      margin: 0 0 12px;
    }

    #startScreen p {
      font-size: 16px;
      line-height: 1.5;
      max-width: 340px;
      margin: 0;
      opacity: 0.86;
    }

    #startBtn {
      margin-top: 24px;
      padding: 14px 30px;
      border: none;
      border-radius: 999px;
      background: white;
      color: black;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    #note {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 9998;
      color: white;
      background: rgba(0, 0, 0, 0.58);
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      pointer-events: none;
    }
  </style>

  <script>
    AFRAME.registerComponent("play-video-on-marker", {
      init: function () {
        const marker = this.el;
        const video = document.querySelector("#aifxVideo");
        const note = document.querySelector("#note");
        const markerId = marker.getAttribute("data-marker-id");

        let lostTimer = null;

        marker.addEventListener("markerFound", async function () {
          if (lostTimer) {
            clearTimeout(lostTimer);
            lostTimer = null;
          }

          note.innerText = "เจอ " + markerId + " แล้ว กำลังเล่นวิดีโอ";
          console.log("Marker found:", markerId);

          // เผื่อใช้ Google Analytics ภายหลัง
          if (typeof gtag === "function") {
            gtag("event", "marker_found", {
              event_category: "AIFX_AR",
              marker_id: markerId
            });
          }

          try {
            await video.play();
          } catch (error) {
            console.log("Video play error:", error);
          }
        });

        marker.addEventListener("markerLost", function () {
          console.log("Marker lost:", markerId);

          lostTimer = setTimeout(function () {
            note.innerText = "จ่อไปที่ AIFX Marker 01 หรือ 02 แล้ววิดีโอจะเล่นบน marker";
            video.pause();

            // ไม่ reset เวลา เพื่อช่วยลดอาการกระพริบ
            // video.currentTime = 0;
          }, 1000);
        });
      }
    });

    document.addEventListener("DOMContentLoaded", function () {
      const startBtn = document.querySelector("#startBtn");
      const startScreen = document.querySelector("#startScreen");
      const video = document.querySelector("#aifxVideo");

      startBtn.addEventListener("click", async function () {
        try {
          await video.play();
          video.pause();
          video.currentTime = 0;
        } catch (error) {
          console.log("Video unlock:", error);
        }

        startScreen.style.display = "none";
      });
    });
  </script>
</head>

<body>
  <div id="startScreen">
    <h1>AIFX AR Demo</h1>
    <p>
      กด Start AR แล้วอนุญาตให้ใช้กล้อง<br />
      จากนั้นจ่อมือถือไปที่ AIFX Marker 01 หรือ 02
    </p>
    <button id="startBtn">Start AR</button>
  </div>

  <div id="note">
    จ่อไปที่ AIFX Marker 01 หรือ 02 แล้ววิดีโอจะเล่นบน marker
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true"
    arjs="sourceType: webcam; debugUIEnabled: false;"
  >
    <a-assets>
      <video
        id="aifxVideo"
        src="./assets/video/aifx-motion.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <!-- Marker 01 -->
    <a-marker
      type="pattern"
      url="./assets/marker/pattern-aifx-01.patt"
      data-marker-id="AIFX_01"
      play-video-on-marker
      emitevents="true"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
    >
      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="1.125"
        height="2"
        material="shader: flat; src: #aifxVideo; side: double;"
      ></a-plane>
    </a-marker>

    <!-- Marker 02 -->
    <a-marker
      type="pattern"
      url="./assets/marker/pattern-aifx-02.patt"
      data-marker-id="AIFX_02"
      play-video-on-marker
      emitevents="true"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
    >
      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="1.125"
        height="2"
        material="shader: flat; src: #aifxVideo; side: double;"
      ></a-plane>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
```
